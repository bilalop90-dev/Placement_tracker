<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placement Tracker</title>
  <meta name="description" content="A local placement preparation tracker for Java backend developers." />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('placement_tracker_theme');
        var theme = stored
          ? stored
          : window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <!-- Mobile top bar -->
  <header class="topbar" id="topbar">
    <button class="topbar__menu" id="menuToggle" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="topbar__brand">Placement Tracker</span>
    <span class="topbar__streak" id="topbarStreak">🔥 0</span>
  </header>

  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__logo">PT</div>
        <div class="sidebar__title">
          <span class="sidebar__name">Placement</span>
          <span class="sidebar__sub">Tracker</span>
        </div>
      </div>

      <nav class="sidebar__nav" id="nav">
        <button class="nav__link is-active" data-view="dashboard">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav__link" data-view="java">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>Java Dev Track</span>
        </button>
        <button class="nav__link" data-view="aptitude">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Aptitude Track</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="streak-pill" id="sidebarStreak" title="Current study streak">
          <span class="streak-pill__flame">🔥</span>
          <span class="streak-pill__count" id="streakCount">0</span>
          <span class="streak-pill__label">day streak</span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="theme-toggle__sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-toggle__moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span class="theme-toggle__label">Theme</span>
        </button>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Main content -->
    <main class="main" id="main">
      <!-- Views are rendered here by app.js -->
    </main>
  </div>

  <!-- Quiz / Results full-screen overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay__inner" id="overlayInner"></div>
  </div>

  <!-- Toast container -->
  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
